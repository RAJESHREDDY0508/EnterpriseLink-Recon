version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# EnterpriseLink Recon — Local Development Stack
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up --build -d          Build and start all services
#   docker compose up -d sqlserver        Start only SQL Server
#   docker compose logs -f worker-service  Tail worker logs
#   docker compose down -v                Stop and remove volumes
#
# Service ports (host → container):
#   Gateway       → http://localhost:5000   (routes all /api/* traffic)
#   Auth          → http://localhost:5001   (direct dev access)
#   Tenant        → http://localhost:5002
#   Ingestion     → http://localhost:5003
#   Worker        → http://localhost:5004   (/health only)
#   Dashboard     → http://localhost:5005
#   RabbitMQ UI   → http://localhost:15672  (user: eluser / elpassword)
#   SQL Server    → localhost:1433
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: el-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SQL_SA_PASSWORD:-Dev@Password123!}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SQL_SA_PASSWORD:-Dev@Password123!}" -Q "SELECT 1" -b -C
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - el-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: el-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-eluser}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS:-elpassword}"
      RABBITMQ_DEFAULT_VHOST: "enterpriselink"
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - el-network

  # ── Application Services ─────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/EnterpriseLink.Gateway/Dockerfile
    container_name: el-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      ingestion-service:
        condition: service_healthy
      dashboard-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Auth/Dockerfile
    container_name: el-auth
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EnterpriseLink_Auth;User Id=sa;Password=${SQL_SA_PASSWORD:-Dev@Password123!};TrustServerCertificate=True"
    ports:
      - "5001:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

  tenant-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Tenant/Dockerfile
    container_name: el-tenant
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EnterpriseLink_Core;User Id=sa;Password=${SQL_SA_PASSWORD:-Dev@Password123!};TrustServerCertificate=True"
    ports:
      - "5002:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

  ingestion-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Ingestion/Dockerfile
    container_name: el-ingestion
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EnterpriseLink_Core;User Id=sa;Password=${SQL_SA_PASSWORD:-Dev@Password123!};TrustServerCertificate=True"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__VirtualHost: "enterpriselink"
      RabbitMQ__Username: "${RABBITMQ_USER:-eluser}"
      RabbitMQ__Password: "${RABBITMQ_PASS:-elpassword}"
    ports:
      - "5003:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

  worker-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Worker/Dockerfile
    container_name: el-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EnterpriseLink_Core;User Id=sa;Password=${SQL_SA_PASSWORD:-Dev@Password123!};TrustServerCertificate=True"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__VirtualHost: "enterpriselink"
      RabbitMQ__Username: "${RABBITMQ_USER:-eluser}"
      RabbitMQ__Password: "${RABBITMQ_PASS:-elpassword}"
    ports:
      - "5004:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

  integration-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Integration/Dockerfile
    container_name: el-integration
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Integration__StorageRoot: /app/integration-files
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__VirtualHost: "enterpriselink"
      RabbitMQ__Username: "${RABBITMQ_USER:-eluser}"
      RabbitMQ__Password: "${RABBITMQ_PASS:-elpassword}"
    ports:
      - "5006:8080"
    volumes:
      - integration-files:/app/integration-files
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

  dashboard-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Dashboard/Dockerfile
    container_name: el-dashboard
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EnterpriseLink_Core;User Id=sa;Password=${SQL_SA_PASSWORD:-Dev@Password123!};TrustServerCertificate=True"
    ports:
      - "5005:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

# ── Volumes & Networks ──────────────────────────────────────────────────────────

volumes:
  sqlserver-data:
    name: el-sqlserver-data
  rabbitmq-data:
    name: el-rabbitmq-data
  integration-files:
    name: el-integration-files

networks:
  el-network:
    name: el-network
    driver: bridge
