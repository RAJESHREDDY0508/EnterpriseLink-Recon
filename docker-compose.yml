version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# EnterpriseLink Recon — Local Development Stack
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d              Start all services
#   docker compose up -d sqlserver    Start only SQL Server
#   docker compose logs -f worker     Tail worker logs
#   docker compose down -v            Stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: el-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SQL_SA_PASSWORD:-Dev@Password123!}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "${SQL_SA_PASSWORD:-Dev@Password123!}" -Q "SELECT 1" -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - el-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: el-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-eluser}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS:-elpassword}"
      RABBITMQ_DEFAULT_VHOST: "enterpriselink"
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - el-network

  # ── Application Services ─────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/EnterpriseLink.Gateway/Dockerfile
    container_name: el-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"
    depends_on:
      auth-service:
        condition: service_started
      ingestion-service:
        condition: service_started
      dashboard-service:
        condition: service_started
    networks:
      - el-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Auth/Dockerfile
    container_name: el-auth
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EnterpriseLink_Auth;User Id=sa;Password=${SQL_SA_PASSWORD:-Dev@Password123!};TrustServerCertificate=True"
    ports:
      - "5001:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

  ingestion-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Ingestion/Dockerfile
    container_name: el-ingestion
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EnterpriseLink_Core;User Id=sa;Password=${SQL_SA_PASSWORD:-Dev@Password123!};TrustServerCertificate=True"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__VirtualHost: "enterpriselink"
      RabbitMQ__Username: "${RABBITMQ_USER:-eluser}"
      RabbitMQ__Password: "${RABBITMQ_PASS:-elpassword}"
    ports:
      - "5002:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

  worker-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Worker/Dockerfile
    container_name: el-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EnterpriseLink_Core;User Id=sa;Password=${SQL_SA_PASSWORD:-Dev@Password123!};TrustServerCertificate=True"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__VirtualHost: "enterpriselink"
      RabbitMQ__Username: "${RABBITMQ_USER:-eluser}"
      RabbitMQ__Password: "${RABBITMQ_PASS:-elpassword}"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

  dashboard-service:
    build:
      context: .
      dockerfile: src/Services/EnterpriseLink.Dashboard/Dockerfile
    container_name: el-dashboard
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EnterpriseLink_Core;User Id=sa;Password=${SQL_SA_PASSWORD:-Dev@Password123!};TrustServerCertificate=True"
    ports:
      - "5003:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - el-network
    restart: unless-stopped

# ── Volumes & Networks ─────────────────────────────────────────────────────────

volumes:
  sqlserver-data:
    name: el-sqlserver-data
  rabbitmq-data:
    name: el-rabbitmq-data

networks:
  el-network:
    name: el-network
    driver: bridge
