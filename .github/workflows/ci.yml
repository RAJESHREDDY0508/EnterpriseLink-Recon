name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build & Unit Tests
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore EnterpriseLink.sln

      - name: Build (Release)
        run: dotnet build EnterpriseLink.sln --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test EnterpriseLink.sln \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: ./TestResults/**/coverage.cobertura.xml

  # ─────────────────────────────────────────
  # Job 2: Code Quality Gate
  # ─────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore EnterpriseLink.sln

      - name: Check formatting
        run: dotnet format EnterpriseLink.sln --verify-no-changes --severity warn

  # ─────────────────────────────────────────
  # Job 3: Docker Build Validation
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Gateway/EnterpriseLink.Gateway/Dockerfile
          push: false
          tags: enterpriselink/gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Auth image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Services/EnterpriseLink.Auth/Dockerfile
          push: false
          tags: enterpriselink/auth:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Ingestion image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Services/EnterpriseLink.Ingestion/Dockerfile
          push: false
          tags: enterpriselink/ingestion:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Services/EnterpriseLink.Worker/Dockerfile
          push: false
          tags: enterpriselink/worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Tenant image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Services/EnterpriseLink.Tenant/Dockerfile
          push: false
          tags: enterpriselink/tenant:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Services/EnterpriseLink.Dashboard/Dockerfile
          push: false
          tags: enterpriselink/dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
